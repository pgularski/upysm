name: Publish mip

on:
  workflow_dispatch:
    inputs:
      pysm-version:
        description: 'pysm version to package, or "latest"'
        required: true
        default: latest
      package-profile:
        description: 'Files to copy from pysm'
        required: true
        default: core
        type: choice
        options:
          - core
          - all

permissions:
  contents: write

jobs:
  publish:
    name: Publish mip package
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Build and check package artifacts
        run: |
          python -m scripts.build_upysm \
            --pysm-version "${{ inputs['pysm-version'] }}" \
            --package-profile "${{ inputs['package-profile'] }}" \
            --mip-dir site \
            --metadata-file build/upysm-release.json \
            --check \
            --smoke

      - name: Read release metadata
        id: release
        run: |
          version="$(python -c 'import json; print(json.load(open("build/upysm-release.json"))["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish mip package to GitHub Pages branch
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          site_dir="$PWD/site"
          pages_dir="$(mktemp -d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages "$pages_dir" origin/gh-pages
          else
            git worktree add --detach "$pages_dir"
            git -C "$pages_dir" switch --orphan gh-pages
            git -C "$pages_dir" rm -rf . || true
          fi

          rm -rf \
            "$pages_dir/.nojekyll" \
            "$pages_dir/index.html" \
            "$pages_dir/package.json" \
            "$pages_dir/pysm" \
            "$pages_dir/latest" \
            "$pages_dir/$VERSION"
          cp -R "$site_dir"/. "$pages_dir"/

          git -C "$pages_dir" add .
          if git -C "$pages_dir" diff --cached --quiet; then
            echo "No mip package changes to publish."
            exit 0
          fi

          git -C "$pages_dir" commit -m "Publish upysm mip package $VERSION"
          git -C "$pages_dir" push origin gh-pages
